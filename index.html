<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STL Webcams</title>
  <meta name="description" content="A dashboard of live St. Louis area webcams — streams and still cameras." />
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="vendor/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <h1>STL Webcams</h1>
    </div>
    <nav class="tabs" id="tabs" role="tablist" aria-label="Views"></nav>
    <div class="topbar-right">
      <span class="clock" id="clock" aria-label="Central time" title="Central Time"></span>
      <span class="topbar-meta" id="meta"></span>
    </div>
  </header>

  <main>
    <div class="filters" id="filters" role="group" aria-label="Filters" hidden></div>
    <div class="grid" id="grid" aria-live="polite"></div>
    <p class="empty" id="empty" hidden>No cameras match these filters.</p>
  </main>

  <footer class="footer">
    <span id="footer-count"></span>
    <span class="sep">·</span>
    <a href="https://github.com/kawfey/stl-webcam-dashboard" rel="noopener">source</a>
    <span class="sep" id="version-sep" hidden>·</span>
    <span id="footer-version"></span>
  </footer>

  <script src="vendor/hls.min.js"></script>
  <script src="vendor/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
